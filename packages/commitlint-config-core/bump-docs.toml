[tool.bumpversion]
current_version = "0.0.0"
parse = '''
(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)
(?:-(?P<pre_release>(alpha|beta|rc))\.(?P<pre_release_number>\d+))?
'''
serialize = [
  "{major}.{minor}.{patch}-{pre_release}.{pre_release_number}",
  "{major}.{minor}.{patch}",
]
search = "{current_version}"
replace = "{new_version}"
regex = false
ignore_missing_version = false
tag = false
sign_tags = false
tag_name = "v{new_version}"
tag_message = "Bump version: {current_version} → {new_version}"
allow_dirty = false
commit = false
message = "Bump version: {current_version} → {new_version}"
commit_args = ""

[[tool.bumpversion.files]]
filename = "packages/commitlint-config-core/docs/installation/npm.md"
search = '@hadenlabs/commitlint-config-core@{current_version}'
replace = '@hadenlabs/commitlint-config-core@{new_version}'

[[tool.bumpversion.files]]
filename = "packages/commitlint-config-core/docs/installation/pnpm.md"
search = '@hadenlabs/commitlint-config-core@{current_version}'
replace = '@hadenlabs/commitlint-config-core@{new_version}'

[[tool.bumpversion.files]]
filename = "packages/commitlint-config-core/docs/installation/bun.md"
search = '@hadenlabs/commitlint-config-core@{current_version}'
replace = '@hadenlabs/commitlint-config-core@{new_version}'

[[tool.bumpversion.files]]
filename = "packages/commitlint-config-core/docs/installation/yarn.md"
search = '@hadenlabs/commitlint-config-core@{current_version}'
replace = '@hadenlabs/commitlint-config-core@{new_version}'

[[tool.bumpversion.files]]
filename = "packages/commitlint-config-core/package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'